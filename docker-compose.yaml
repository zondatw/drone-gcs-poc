# PX4 SITL + mavsdk_server
#
# Problem: Docker Desktop for Mac only proxies TCP through host.docker.internal —
# UDP (MAVLink) sent from a container to the host is silently dropped.
#
# Fix: override host.docker.internal → 127.0.0.1 in px4-sitl so the entrypoint
# patches MAVLink to stay on localhost. The companion container shares px4-sitl's
# network namespace and receives the MAVLink there.
#
# Design: the container only provides infra (PX4 + mavsdk_server). The Python
# client runs on the Mac host as the *single* gRPC client (gRPC :50051 exposed).
# Two clients on one mavsdk_server makes command ACKs (arm/takeoff) time out,
# so we deliberately don't run any Python client inside the container.
#
# Usage:
#   docker compose up            ← PX4 + mavsdk_server (gRPC :50051)
#   uv run python telemetry.py   ← 第 1 關: 印遙測
#   uv run uvicorn server:app    ← 第 2 關: 飛行控制 + Web (見 README)
#
# Stop: Ctrl-C / docker compose down

services:
  px4-sitl:
    image: px4io/px4-sitl:latest
    extra_hosts:
      - "host.docker.internal:127.0.0.1"   # keeps MAVLink on localhost
    ports:
      - "50051:50051"   # expose gRPC so Python can run on the Mac host too

  app:
    image: python:3.13-slim
    depends_on:
      - px4-sitl
    network_mode: "service:px4-sitl"
    working_dir: /app
    volumes:
      - ./:/app
    command:
      - sh
      - -c
      - |
        set -e
        BIN=/app/.mavsdk_server_linux
        if [ ! -x "$$BIN" ]; then
          echo '>>> 下載 mavsdk_server v3.15.0 (linux-arm64-musl) ...'
          python -c "import urllib.request; urllib.request.urlretrieve('https://github.com/mavlink/MAVSDK/releases/download/v3.15.0/mavsdk_server_linux-arm64-musl','$$BIN')"
          chmod +x "$$BIN"
        else
          echo '>>> 已有快取的 mavsdk_server,略過下載'
        fi
        echo '>>> 啟動 mavsdk_server (udpin 14540, gRPC 50051) ...'
        exec "$$BIN" udpin://0.0.0.0:14540 -p 50051
    restart: "no"
