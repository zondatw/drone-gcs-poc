# 全容器化多機 GCS —— 本檔由 gen_compose.py 產生,別手改。
#
# 每台無人機一組獨立容器(各自 netns):
#   px4-sitl-{i}  PX4 SITL(PX4_HOME_* 錯開起飛點)→ 對外 gRPC host port 5005{i}
#   mavsdk-{i}    與 px4-sitl-{i} 共用 netns,跑 mavsdk_server(udpin 14540 → gRPC 50051)
# 再加上:
#   backend        FastAPI,連各 px4-sitl-{i}:50051(gRPC/TCP,跨容器 OK)→ :8000
#   web            nginx serve 前端 build,並 proxy /api、/ws 給 backend → :5173
#
# 一鍵全起(前後端 + 無人機):
#   python gen_compose.py 3
#   docker compose up --build        # 第一次需 build images;之後 docker compose up
#   開 http://localhost:5173
#   (要 Cesium 衛星圖:先 export VITE_CESIUM_ION_TOKEN=你的token 再 build)
#
# 只起 infra、前後端改在 host 跑(開發 hot reload):
#   docker compose up px4-sitl-1 mavsdk-1 [px4-sitl-2 mavsdk-2 ...]
#   cd server && DRONE_COUNT=3 uv run uvicorn server:app --reload
#   cd web && npm run dev

services:
  px4-sitl-1:
    image: px4io/px4-sitl:latest
    extra_hosts:
      - "host.docker.internal:127.0.0.1"   # keeps MAVLink on localhost
    environment:
      PX4_HOME_LAT: "47.397700"
      PX4_HOME_LON: "8.545600"
      PX4_HOME_ALT: "488.0"
    ports:
      - "50051:50051"   # 對外 gRPC(drone 1)

  mavsdk-1:
    image: python:3.13-slim
    depends_on:
      - px4-sitl-1
    network_mode: "service:px4-sitl-1"
    working_dir: /app
    volumes:
      - ./server:/app
    command:
      - sh
      - -c
      - |
        set -e
        BIN=/app/.mavsdk_server_linux
        if [ ! -x "$$BIN" ]; then
          echo '>>> 下載 mavsdk_server v3.15.0 (linux-arm64-musl) ...'
          python -c "import urllib.request; urllib.request.urlretrieve('https://github.com/mavlink/MAVSDK/releases/download/v3.15.0/mavsdk_server_linux-arm64-musl','$$BIN')"
          chmod +x "$$BIN"
        fi
        echo '>>> 啟動 mavsdk_server (udpin 14540, gRPC 50051) ...'
        exec "$$BIN" udpin://0.0.0.0:14540 -p 50051
    restart: "no"

  px4-sitl-2:
    image: px4io/px4-sitl:latest
    extra_hosts:
      - "host.docker.internal:127.0.0.1"   # keeps MAVLink on localhost
    environment:
      PX4_HOME_LAT: "47.398500"
      PX4_HOME_LON: "8.545600"
      PX4_HOME_ALT: "488.0"
    ports:
      - "50052:50051"   # 對外 gRPC(drone 2)

  mavsdk-2:
    image: python:3.13-slim
    depends_on:
      - px4-sitl-2
    network_mode: "service:px4-sitl-2"
    working_dir: /app
    volumes:
      - ./server:/app
    command:
      - sh
      - -c
      - |
        set -e
        BIN=/app/.mavsdk_server_linux
        if [ ! -x "$$BIN" ]; then
          echo '>>> 下載 mavsdk_server v3.15.0 (linux-arm64-musl) ...'
          python -c "import urllib.request; urllib.request.urlretrieve('https://github.com/mavlink/MAVSDK/releases/download/v3.15.0/mavsdk_server_linux-arm64-musl','$$BIN')"
          chmod +x "$$BIN"
        fi
        echo '>>> 啟動 mavsdk_server (udpin 14540, gRPC 50051) ...'
        exec "$$BIN" udpin://0.0.0.0:14540 -p 50051
    restart: "no"

  px4-sitl-3:
    image: px4io/px4-sitl:latest
    extra_hosts:
      - "host.docker.internal:127.0.0.1"   # keeps MAVLink on localhost
    environment:
      PX4_HOME_LAT: "47.399300"
      PX4_HOME_LON: "8.545600"
      PX4_HOME_ALT: "488.0"
    ports:
      - "50053:50051"   # 對外 gRPC(drone 3)

  mavsdk-3:
    image: python:3.13-slim
    depends_on:
      - px4-sitl-3
    network_mode: "service:px4-sitl-3"
    working_dir: /app
    volumes:
      - ./server:/app
    command:
      - sh
      - -c
      - |
        set -e
        BIN=/app/.mavsdk_server_linux
        if [ ! -x "$$BIN" ]; then
          echo '>>> 下載 mavsdk_server v3.15.0 (linux-arm64-musl) ...'
          python -c "import urllib.request; urllib.request.urlretrieve('https://github.com/mavlink/MAVSDK/releases/download/v3.15.0/mavsdk_server_linux-arm64-musl','$$BIN')"
          chmod +x "$$BIN"
        fi
        echo '>>> 啟動 mavsdk_server (udpin 14540, gRPC 50051) ...'
        exec "$$BIN" udpin://0.0.0.0:14540 -p 50051
    restart: "no"

  backend:
    build: ./server
    depends_on:
      - mavsdk-1
      - mavsdk-2
      - mavsdk-3
    environment:
      MAVSDK_TARGETS: "px4-sitl-1:50051,px4-sitl-2:50051,px4-sitl-3:50051"
    ports:
      - "8000:8000"
    restart: "no"

  web:
    build: ./web
    depends_on:
      - backend
    environment:                       # token 在「啟動時」帶入(不烤進 image)
      VITE_CESIUM_ION_TOKEN: "${VITE_CESIUM_ION_TOKEN:-}"
    ports:
      - "5173:80"
    restart: "no"
