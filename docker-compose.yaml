      PX4_HOME_LAT: "47.399300"
      PX4_HOME_LON: "8.545600"
      PX4_HOME_ALT: "488.0"
    ports:
      - "50053:50051"   # 對外 gRPC(drone 3)

  mavsdk-3:
    image: python:3.13-slim
    depends_on:
      - px4-sitl-3
    network_mode: "service:px4-sitl-3"
    working_dir: /app
    volumes:
      - ./server:/app
